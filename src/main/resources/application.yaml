spring:
  application:
    name: spa-booking
  datasource:
    url: ${SPA_BOOKING_DB_URL}
    username: ${SPA_BOOKING_DB_USERNAME}
    password: ${SPA_BOOKING_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update     # hoặc: none | validate | create | create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPA_BOOKING_MAIL_USERNAME}
    password: ${SPA_BOOKING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # (Tùy chọn) Logging SQL rõ hơn trong console
  logging:
    level:
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE


  # Dùng để trỏ tới thư mục chứa các script Flyway
  flyway:
    locations: classpath:/db/migration,classpath:/dev/db/migration
    # Phiên bản baseline sẽ = 1 và không thực hiện bất kỳ thay đổi nào trong DB
    baseline-on-migrate: true
    baseline-version: 0
server:
  port: 8080

jwt:
  # Base64 secret (>= 32 bytes trước khi base64). Xem cách generate ở dưới.
  secret:  ${SPA_BOOKING_JWT_SECRET}
  # 1 giờ = 3600000 ms
  expiration: 3600000
  # 7 ngày = 604800000 ms (optional)
  refresh-expiration: 604800000
# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    displayRequestDuration: true
    displayOperationId: false
    filter: true
    showExtensions: true
    showCommonExtensions: true
    tryItOutEnabled: true
    persistAuthorization: true
    syntaxHighlight:
      theme: monokai
  show-actuator: false
  paths-to-match:
    - /api/**
  paths-to-exclude:
    - /api/internal/**


  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0